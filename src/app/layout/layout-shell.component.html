<div class="shell">
  <header class="header" role="banner">
    <div class="header__inner">
      <a class="brand" routerLink="/" aria-label="Ir al inicio">
        <img class="brand__logo" src="/logo.svg" alt="Logo" />
        <span class="brand__title">{{ title() }}</span>
      </a>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar" aria-label="Menú principal">
      <nav class="nav">
        <a class="nav__item" routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
          Inicio
        </a>
        <a class="nav__item" routerLink="/users" routerLinkActive="is-active">
          Usuarios
        </a>
      </nav>
    </aside>

    <main class="main" role="main">
      <router-outlet />
    </main>
  </div>

  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <span class="muted">MISW 4104 • Jhon Jairo Rincon</span>
    </div>
  </footer>
</div>
